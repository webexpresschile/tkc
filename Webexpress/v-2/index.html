<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fade Studio | El Estándar de Oro en Cortes</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Roboto:wght@300;400&display=swap" rel="stylesheet">
</head>
<body>

    <header class="hero">
        <div class="hero-content">
            <h1>EL ESTÁNDAR DE ORO EN CORTES MASCULINOS</h1>
            <p>En Fade Studio fusionamos técnica clásica con tendencias urbanas. Elevamos tu confianza, no solo tu look.</p>
            <a href="https://wa.me/tu-numero" class="btn-primary">RESERVA TU TURNO AHORA</a>
        </div>
    </header>

    <section class="gallery-container">
        <h2 class="section-title">THE LOOKBOOK - NUESTRA FIRMA</h2>
        <div class="grid-gallery">
            <div class="gallery-item" data-caption="Textured Crop + Skin Fade">
                <img src="https://images.unsplash.com/photo-1503951914875-452162b0f3f1?auto=format&fit=crop&q=80&w=800" alt="Skin Fade">
            </div>
            <div class="gallery-item" data-caption="Classic Pompadour">
                <img src="https://images.unsplash.com/photo-1621605815971-fbc98d665033?auto=format&fit=crop&q=80&w=800" alt="Pompadour">
            </div>
            <div class="gallery-item" data-caption="Beard Sculpting">
                <img src="https://images.unsplash.com/photo-1599351431247-f10f21290d93?auto=format&fit=crop&q=80&w=800" alt="Beard">
            </div>
            <div class="gallery-item" data-caption="Modern Mullet">
                <img src="https://images.unsplash.com/photo-1622286332618-f2802b9c54c3?auto=format&fit=crop&q=80&w=800" alt="Mullet">
            </div>
        </div>
    </section>

    <div id="lightbox" class="lightbox">
        <span class="close-btn">&times;</span>
        <img class="lightbox-img" src="" alt="Zoom">
        <div id="caption"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
